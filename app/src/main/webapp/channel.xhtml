<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>Channel</title>
</h:head>

<h:body>
<ui:include src="navbar.xhtml"/>

<f:view>
    <f:event type="preRenderView" listener="#{channelChatBean.loadChannels}"/>

<h2>Channel</h2>

<p><h:link value="Back to My Servers" outcome="servers"/></p>



<!-- STATUS MESSAGE -->
<h:panelGroup rendered="#{not empty channelChatBean.statusMessage}">
    <p style="color: red;"><h:outputText value="#{channelChatBean.statusMessage}"/></p>
</h:panelGroup>

<!-- CREATE CHANNEL -->
<h:form>
    <h:inputText value="#{channelChatBean.newChannelName}" 
                 placeholder="New channel name" />

    <h:commandButton value="Create Channel"
        action="#{channelChatBean.createChannel}" />
</h:form>

<hr/>

<!-- CHANNEL LIST -->
<h:form>
    <ui:repeat value="#{channelChatBean.channelIds}" var="cid" varStatus="i">

        <h:commandButton
            value="#{channelChatBean.channelNames[i.index]}"
            action="#{channelChatBean.openChannel}">
            <f:setPropertyActionListener 
                target="#{channelChatBean.currentChannelId}" 
                value="#{cid}" />
        </h:commandButton>

        <br/>

    </ui:repeat>
</h:form>

<hr/>

<!-- NO CHANNEL SELECTED -->
<h:panelGroup rendered="#{channelChatBean.currentChannelId == -1}">
    <p>Select a channel from the list</p>
</h:panelGroup>

<!-- HAS READ PERMISSION -->
<h:panelGroup rendered="#{channelChatBean.currentChannelId != -1 and channelChatBean.canRead()}">

    <!-- MESSAGES -->
    <h:form>
        <h:commandButton value="Refresh" action="#{channelChatBean.loadMessages}" />
        <br/><br/>
        
        <ui:repeat value="#{channelChatBean.chatLog}" var="m">

            <p>#{m.text}</p>

            <!-- IMAGE FROM DATABASE -->
            <h:graphicImage value="serveImage?messageId=#{m.id}"
                            rendered="#{m.hasImage()}"
                            width="200"/>


            <!-- DELETE (Owner or message author only) -->
            <h:commandButton value="Delete"
                action="#{channelChatBean.deleteMessage(m.id)}"
                rendered="#{channelChatBean.canDeleteMessage(m.authorId)}" />

            <hr/>

        </ui:repeat>
    </h:form>

</h:panelGroup>

<!-- NO READ PERMISSION -->
<h:panelGroup rendered="#{channelChatBean.currentChannelId != -1 and !channelChatBean.canRead()}">
    <p>You do not have permission to view this channel.</p>
</h:panelGroup>

<br/>

<!-- WRITE PERMISSION -->
<h:panelGroup rendered="#{channelChatBean.currentChannelId != -1 and channelChatBean.canWrite()}">

    <h:form enctype="multipart/form-data">

        <h:outputLabel for="msgInput" value="Message: "/>
        <h:inputText id="msgInput" value="#{channelChatBean.messageText}" />

        <h:outputLabel for="imgInput" value="Image: "/>
        <h:inputFile id="imgInput" value="#{imageUploadBean.file}" />

        <h:commandButton value="Send"
            action="#{channelChatBean.sendMessage}" />

    </h:form>

</h:panelGroup>

<!-- OWNER ONLY: MANAGE PERMISSIONS -->
<h:panelGroup rendered="#{channelChatBean.currentChannelId != -1 and channelChatBean.serverOwner}">
    <hr/>
    <h3>Channel Permissions (Owner Only)</h3>
    <h:form>
        <ui:repeat value="#{channelChatBean.roleIds}" var="rid" varStatus="i">
            <p>
                <strong>#{channelChatBean.roleNames[i.index]}</strong>
                <br/>
                <h:selectBooleanCheckbox value="#{channelChatBean.roleCanRead[i.index]}" id="read"/>
                <h:outputLabel for="read" value="Can Read"/>
                
                <h:selectBooleanCheckbox value="#{channelChatBean.roleCanWrite[i.index]}" id="write"/>
                <h:outputLabel for="write" value="Can Write"/>
                
                <h:commandButton value="Update"
                    action="#{channelChatBean.updateChannelPermissions(rid, channelChatBean.roleCanRead[i.index], channelChatBean.roleCanWrite[i.index])}" />
            </p>
        </ui:repeat>
    </h:form>
</h:panelGroup>

</f:view>
</h:panelGroup>
</h:body>
</html>
