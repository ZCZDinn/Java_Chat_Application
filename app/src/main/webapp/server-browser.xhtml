<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <f:metadata>
        <f:viewAction action="#{serverManagerBean.loadPublicServers}"/>
    </f:metadata>
    <h:head>
        <title>Browse Public Servers</title>
    </h:head>
    <h:body>
        <h:panelGroup rendered="#{userLoginBean.token == null}">
            <p>You must be logged in. <h:link value="Go to Login" outcome="chat"/></p>
        </h:panelGroup>

        <h:panelGroup id="browserPage" rendered="#{userLoginBean.token != null}">
            <h1>Browse Public Servers</h1>

            <h:form>
                <h:commandButton value="Refresh" action="#{serverManagerBean.loadPublicServers}">
                    <f:ajax execute="@form" render=":browserPage"/>
                </h:commandButton>
            </h:form>

            <h:panelGroup rendered="#{not empty serverManagerBean.statusMessage}">
                <p><h:outputText value="#{serverManagerBean.statusMessage}"/></p>
            </h:panelGroup>

            <h:panelGroup rendered="#{empty serverManagerBean.publicServers}">
                <p>No public servers found. Click Refresh to load them.</p>
            </h:panelGroup>

            <h:dataTable value="#{serverManagerBean.publicServers}" var="srv"
                         rendered="#{not empty serverManagerBean.publicServers}"
                         border="1">
                <h:column>
                    <f:facet name="header">Server Name</f:facet>
                    <h:outputText value="#{srv.name}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">Join</f:facet>
                    <h:outputText value="Joined" rendered="#{srv.joined}"/>
                    <h:form rendered="#{not srv.joined}">
                        <h:commandButton value="Join" action="#{serverManagerBean.joinPublicServer(srv.serverId)}"/>
                    </h:form>
                </h:column>
            </h:dataTable>

            <p><h:link value="Back to My Servers" outcome="servers"/></p>
        </h:panelGroup>
    </h:body>
</html>
