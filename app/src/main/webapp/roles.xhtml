<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <h:head>
        <title>Roles</title>
    </h:head>
    <h:body>
        <h1>Manage Roles:</h1>
        <h:form>
            <h1>Create Role:</h1>
            <h:inputText value="#{roleManagerBean.newRole}"/>
            <h:commandButton value="Add Role" action="#{roleManagerBean.createRole}"></h:commandButton>
            <ui:repeat value="#{roleManagerBean.roles}" var="role">
                <p>#{role}</p>
            </ui:repeat>
        </h:form>
        <br/>
        <h:form>
            <h1>Add/Remove Roles:</h1>
            <h:outputText value="Username:"/>
            <h:inputText value="#{roleManagerBean.selectedUserName}"/>

            <h:outputText value="RoleID:"/>
            <h:inputText value="#{roleManagerBean.currentRoleId}"/>

            <h:commandButton value="Assign role" action="#{roleManagerBean.assignRoleToUser}"/>

            <h:commandButton value="Delete role" action="#{roleManagerBean.deleteUserRole}"/>
        </h:form>
        <br/>
        <h:form>
            <h1>User Roles:</h1>
            <h:outputText value="Username:"/>
            <h:inputText value="#{roleManagerBean.selectedUserName}"/>

            <h:commandButton value="Load User Roles" action="#{roleManagerBean.loadUserRoles}"/>

            <ui:repeat value="#{roleManagerBean.userRoles}" var="userRole">
                <p>#{userRole}</p>
            </ui:repeat>

        </h:form>
    </h:body>
</html>
